# IGE-124423 - David Costa
# ============================================================
#  God Class Detection Workflow
#  Baseado em: "Object-Oriented Metrics in Practice"
#              Lanza & Marinescu, Springer, 2006 — Cap. 5.3
#
#  Estratégia de deteção (Fig. 5.2 do livro):
#    ATFD > FEW (> 4)          [Access To Foreign Data]
#    AND WMC >= VERY_HIGH (47) [Weighted Method Count — Java, Tabela 2.2]
#    AND TCC < ONE_THIRD (0.33)[Tight Class Cohesion — Tabela 2.3]
#
#  Dois estágios complementares:
#    1. Qodana  — quality gate sobre cheiros padrão (IntelliJ inspections)
#    2. Script  — deteção precisa de God Class via métricas do MetricsTree (Excel)
# ============================================================

name: Code Quality — God Class Detection

on:
  push:
    branches: [ "feature/visualizacao-grafica"]

jobs:

  # ──────────────────────────────────────────────────────────
  # JOB 1 — Qodana Quality Gate (IntelliJ static analysis)
  # ──────────────────────────────────────────────────────────
  qodana-quality-gate:
    name: Qodana Quality Gate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # necessário para análise incremental

      # Qodana analisa o projeto com as configurações de qodana.yaml
      - name: Run Qodana Scan
        uses: JetBrains/qodana-action@v2024.3
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        with:
          args: >-
            --fail-threshold,0
            --property,idea.headless.enable.statistics=false
          upload-result: true
          artifact-name: qodana-report

      - name: Upload Qodana report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qodana-report
          path: ${{ runner.temp }}/qodana/results/
          retention-days: 14

  # ──────────────────────────────────────────────────────────
  # JOB 2 — God Class Detection (MetricsTree Excel + limiares)
  # ──────────────────────────────────────────────────────────
  god-class-detection:
    name: God Class Detection (Lanza & Marinescu)
    runs-on: ubuntu-latest
    needs: qodana-quality-gate
    if: always()    # corre mesmo que o Qodana falhe, para ter relatório

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openpyxl pandas tabulate

      # Procura dinamicamente por qualquer ficheiro .xlsx na pasta CodeMetrics
      - name: Check MetricsTree file exists
        id: check-file
        run: |
          if compgen -G "CodeMetrics/*.xlsx" > /dev/null; then
            FILE=$(ls CodeMetrics/*.xlsx | head -1)
            echo "file_found=true"  >> $GITHUB_OUTPUT
            echo "target_file=$FILE" >> $GITHUB_OUTPUT
          else
            echo "file_found=false" >> $GITHUB_OUTPUT
            echo "::warning::Nenhum ficheiro Excel de métricas encontrado na pasta CodeMetrics/"
          fi

      - name: Detect God Classes
        id: god-class
        if: steps.check-file.outputs.file_found == 'true'
        shell: python
        run: |
          # ─────────────────────────────────────────────────────────────
          #  Limiares definidos em "Object-Oriented Metrics in Practice"
          #  Lanza & Marinescu, Springer, 2006
          # ─────────────────────────────────────────────────────────────

          import os, sys, pandas as pd
          from tabulate import tabulate

          ATFD_THRESHOLD = 4      # FEW        — Tabela 2.4
          WMC_THRESHOLD  = 47     # VERY HIGH  — Tabela 2.2 (Java)
          TCC_THRESHOLD  = 0.33   # ONE THIRD  — Tabela 2.3

          xlsx_file = os.environ.get("TARGET_FILE")
          cls_df    = pd.read_excel(xlsx_file, sheet_name='Class', header=0)

          # Pivot: uma linha por classe com todas as métricas como colunas
          class_metrics = {}
          for _, row in cls_df.iterrows():
              name = row.get('name')
              code = row.get('metric_code')
              val  = row.get('value')
              if pd.notna(name) and pd.notna(code):
                  if name not in class_metrics:
                      class_metrics[name] = {}
                  try:
                      class_metrics[name][code] = float(str(val).replace(',', '.'))
                  except:
                      pass

          god_classes = []
          suspects    = []   # violam apenas 2 de 3 condições

          for cls_name, m in class_metrics.items():
              atfd = m.get("ATFD", 0)
              wmc  = m.get("WMC",  0)
              tcc  = m.get("TCC",  1.0)

              cond_atfd = atfd  > ATFD_THRESHOLD
              cond_wmc  = wmc  >= WMC_THRESHOLD
              cond_tcc  = tcc   < TCC_THRESHOLD

              score = sum([cond_atfd, cond_wmc, cond_tcc])

              if score == 3:
                  god_classes.append({
                      "Class": cls_name,
                      "ATFD": atfd,
                      f"ATFD > {ATFD_THRESHOLD}": "✓" if cond_atfd else "✗",
                      "WMC":  wmc,
                      f"WMC >= {WMC_THRESHOLD}":  "✓" if cond_wmc  else "✗",
                      "TCC":  round(tcc, 3),
                      f"TCC < {TCC_THRESHOLD}":   "✓" if cond_tcc  else "✗",
                  })
              elif score == 2:
                  suspects.append({
                      "Class": cls_name,
                      "ATFD": atfd,
                      "WMC":  wmc,
                      "TCC":  round(tcc, 3),
                      "Condições violadas": score,
                  })

          # ── Relatório ──────────────────────────────────────────────
          separator = "=" * 70
          print(separator)
          print("  GOD CLASS DETECTION REPORT")
          print("  Baseado em: Lanza & Marinescu (2006), Cap. 5.3")
          print(f"  Limiares: ATFD > {ATFD_THRESHOLD}  |  WMC >= {WMC_THRESHOLD}  |  TCC < {TCC_THRESHOLD}")
          print(separator)

          if god_classes:
              print(f"\n🔴 GOD CLASSES DETETADAS: {len(god_classes)}\n")
              headers = list(god_classes[0].keys())
              rows    = [list(g.values()) for g in god_classes]
              print(tabulate(rows, headers=headers, tablefmt="github"))
          else:
              print("\n✅ Nenhuma God Class detetada.")

          if suspects:
              print(f"\n🟡 SUSPEITOS (2 de 3 condições): {len(suspects)}\n")
              headers = list(suspects[0].keys())
              rows    = [list(s.values()) for s in suspects]
              print(tabulate(rows, headers=headers, tablefmt="github"))

          print(f"\n📊 Total de classes analisadas : {len(class_metrics)}")
          print(f"   God Classes                 : {len(god_classes)}")
          print(f"   Suspeitos                   : {len(suspects)}")
          print(separator)

          # ── GitHub Actions outputs ─────────────────────────────────
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"god_class_count={len(god_classes)}\n")
              f.write(f"suspect_count={len(suspects)}\n")
              names = ",".join(g["Class"] for g in god_classes)
              f.write(f"god_class_names={names}\n")

          # Falhar o workflow se existirem God Classes
          if god_classes:
              print("\n❌ Quality Gate FAILED — God Classes encontradas.")
              sys.exit(1)
        env:
          TARGET_FILE: ${{ steps.check-file.outputs.target_file }}

      - name: Annotate PR with God Class summary
        if: |
          always() &&
          github.event_name == 'pull_request' &&
          steps.god-class.outputs.god_class_count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const count   = '${{ steps.god-class.outputs.god_class_count }}';
            const names   = '${{ steps.god-class.outputs.god_class_names }}';
            const suspects= '${{ steps.god-class.outputs.suspect_count }}';
            const body = [
              '## 🔴 God Class Detection — Quality Gate FAILED',
              '',
              `**${count} God Class(es) detetada(s)** seguindo Lanza & Marinescu (2006), Cap. 5.3`,
              '',
              '### Regra de deteção (Fig. 5.2)',
              '| Métrica | Limiar | Significado |',
              '|---------|--------|-------------|',
              '| ATFD    | > 4    | FEW — acesso excessivo a dados estrangeiros |',
              '| WMC     | ≥ 47   | VERY HIGH — complexidade funcional muito alta (Java) |',
              '| TCC     | < 0.33 | ONE THIRD — coesão interna baixa |',
              '',
              `**Classes afetadas:** \`${names.replace(/,/g, '`, `')}\``,
              '',
              `> ⚠️ ${suspects} classe(s) suspeita(s) violam 2 de 3 condições.`,
              '',
              '### Refabricação sugerida (p. 83)',
              '- Identificar clusters de métodos/atributos coesos',
              '- Aplicar *Split Up God Class* (Demeyer et al., 2002)',
              '- Usar *Sprout Method / Sprout Class* (Feathers, 2005)',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Final status message
        if: always()
        run: |
          COUNT="${{ steps.god-class.outputs.god_class_count }}"
          if [ "$COUNT" = "0" ] || [ -z "$COUNT" ]; then
            echo "✅ Quality Gate PASSED — Nenhuma God Class detetada."
          else
            echo "❌ Quality Gate FAILED — ${COUNT} God Class(es) encontrada(s)."
            echo "   Consulte o relatório acima para detalhes e sugestões de refabricação."
            exit 1
          fi
